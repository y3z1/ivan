<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivan Mauricio Adarme — GIS Specialist & Forestry Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────── */
:root {
  --g900: #0d1f0d;
  --g800: #1a3a1a;
  --g700: #2d5a2d;
  --g600: #3d7a3d;
  --g400: #6aaa6a;
  --g200: #b8d8b8;
  --g100: #dceedd;
  --cream: #faf7f0;
  --cream2: #f0ede4;
  --amber: #d4a017;
  --amber2: #b8860b;
  --ink: #111111;
  --ink2: #2a2a2a;
  --ink3: #555555;
  --panel: rgba(13,31,13,0.96);
  --grid: rgba(45,90,45,0.12);
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
  --serif: 'Playfair Display', serif;
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: var(--sans);
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}
a { text-decoration: none; color: inherit; }

/* ── UTILITY ────────────────────────────────────────── */
.mono { font-family: var(--mono); }
.label {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--g400);
}
.container { max-width: 1140px; margin: 0 auto; padding: 0 2rem; }

/* ── NAV ────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  background: var(--panel);
  border-bottom: 1px solid var(--g700);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem; height: 48px;
}
.nav-id {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: var(--amber);
  display: flex; align-items: center; gap: 0.75rem;
}
.nav-id::before {
  content: '';
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--amber);
  animation: navPing 2s infinite;
}
@keyframes navPing {
  0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(212,160,23,0.4); }
  50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(212,160,23,0); }
}
.nav-links {
  display: flex; gap: 0; list-style: none;
}
.nav-links a {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--g200);
  padding: 0 1.2rem; height: 48px;
  display: flex; align-items: center;
  border-left: 1px solid var(--g700);
  transition: background 0.2s, color 0.2s;
}
.nav-links a:hover { background: rgba(45,90,45,0.3); color: var(--amber); }

/* ── HERO ───────────────────────────────────────────── */
#hero {
  min-height: 100vh;
  padding-top: 48px;
  position: relative;
  background: var(--g900);
  overflow: hidden;
  display: flex; align-items: center;
}

/* Map canvas */
#mapCanvas {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

/* Grid overlay */
#hero::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 1;
}

/* Scanline effect */
#hero::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 2;
}

.hero-content {
  position: relative; z-index: 10;
  padding: 4rem 2rem 4rem 3rem;
  max-width: 640px;
}

.hero-coords {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--amber);
  margin-bottom: 1.5rem;
  display: flex; gap: 1.5rem;
}
.hero-coords span { opacity: 0.8; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--g200);
  border: 1px solid var(--g600);
  padding: 0.3rem 0.8rem;
  margin-bottom: 1.5rem;
  background: rgba(45,90,45,0.15);
}
.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--g400);
  flex-shrink: 0;
}

h1.hero-name {
  font-family: var(--serif);
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 900;
  color: #fff;
  line-height: 1.0;
  letter-spacing: -0.02em;
  margin-bottom: 0.5rem;
}
h1.hero-name em {
  font-style: italic;
  color: var(--g200);
}

.hero-title {
  font-family: var(--sans);
  font-size: clamp(0.9rem, 1.5vw, 1.1rem);
  font-weight: 300;
  color: var(--g200);
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}

.hero-rpf {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--amber);
  letter-spacing: 0.12em;
  margin-bottom: 2.5rem;
  padding-left: 0.8rem;
  border-left: 2px solid var(--amber2);
}

.hero-contact-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  border: 1px solid var(--g700);
  max-width: 440px;
}
.hero-contact-item {
  padding: 0.75rem 1rem;
  border-right: 1px solid var(--g700);
  border-bottom: 1px solid var(--g700);
}
.hero-contact-item:nth-child(even) { border-right: none; }
.hero-contact-item:nth-last-child(-n+2) { border-bottom: none; }
.hero-contact-item .label { margin-bottom: 0.25rem; }
.hero-contact-item a,
.hero-contact-item span {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: #fff;
  transition: color 0.2s;
}
.hero-contact-item a:hover { color: var(--amber); }

/* Compass */
.hero-compass {
  position: absolute;
  right: 3rem; bottom: 3rem;
  z-index: 10;
  opacity: 0.7;
}

/* ── SECTION BASE ───────────────────────────────────── */
section { padding: 5rem 0; }

.sec-header {
  display: flex; align-items: flex-start;
  gap: 1.5rem;
  margin-bottom: 3rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--g200);
}
.sec-num {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--amber);
  margin-top: 0.4rem;
  white-space: nowrap;
}
.sec-title {
  font-family: var(--serif);
  font-size: clamp(1.8rem, 3vw, 2.6rem);
  font-weight: 700;
  color: var(--g800);
  line-height: 1.1;
}
.sec-title em { font-style: italic; color: var(--g600); }

/* ── ABOUT ──────────────────────────────────────────── */
#about { background: var(--cream); }

.about-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: start;
}

.about-summary {
  font-size: 1rem;
  line-height: 1.85;
  color: var(--ink2);
  margin-bottom: 1.5rem;
}

.stats-panel {
  border: 1px solid var(--g200);
  background: var(--cream2);
}
.stats-panel-header {
  background: var(--g800);
  padding: 0.5rem 1rem;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--g200);
  display: flex; align-items: center; gap: 0.5rem;
}
.stats-panel-header::before {
  content: '◉';
  color: var(--amber);
  font-size: 0.5rem;
}
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
}
.stat-cell {
  padding: 1.2rem 1.5rem;
  border-right: 1px solid var(--g200);
  border-bottom: 1px solid var(--g200);
  transition: background 0.2s;
}
.stat-cell:nth-child(even) { border-right: none; }
.stat-cell:nth-last-child(-n+2) { border-bottom: none; }
.stat-cell:hover { background: rgba(45,90,45,0.05); }
.stat-val {
  font-family: var(--serif);
  font-size: 2rem;
  font-weight: 900;
  color: var(--g700);
  line-height: 1;
}
.stat-key {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 0.2rem;
}

.key-skills {
  margin-top: 2rem;
}
.key-skills-title {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--g600);
  margin-bottom: 0.75rem;
}
.tag-cloud { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.tag {
  font-family: var(--mono);
  font-size: 0.6rem;
  padding: 0.25rem 0.65rem;
  border: 1px solid var(--g400);
  color: var(--g700);
  background: transparent;
  transition: all 0.2s;
  cursor: default;
}
.tag:hover {
  background: var(--g700);
  color: var(--cream);
  border-color: var(--g700);
}

/* ── EXPERIENCE ─────────────────────────────────────── */
#experience { background: var(--cream2); }

.timeline { position: relative; }
.timeline::before {
  content: '';
  position: absolute;
  left: 5.5rem; top: 0; bottom: 0;
  width: 1px;
  background: linear-gradient(to bottom, var(--g700), var(--g200), transparent);
}

.tl-item {
  display: grid;
  grid-template-columns: 5.5rem 1fr;
  gap: 2rem;
  margin-bottom: 0;
  position: relative;
}
.tl-item + .tl-item { border-top: 1px solid var(--g100); }

.tl-left {
  padding: 1.5rem 0;
  text-align: right;
}
.tl-year {
  font-family: var(--mono);
  font-size: 0.6rem;
  color: var(--amber2);
  letter-spacing: 0.1em;
  line-height: 1.5;
}

.tl-dot {
  position: absolute;
  left: calc(5.5rem - 4px);
  top: 1.85rem;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--amber);
  border: 2px solid var(--cream2);
  box-shadow: 0 0 0 3px rgba(212,160,23,0.2);
}

.tl-right {
  padding: 1.5rem 0 1.5rem 2rem;
}
.tl-role {
  font-family: var(--serif);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--g800);
  margin-bottom: 0.15rem;
}
.tl-org {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: var(--g600);
  margin-bottom: 0.6rem;
}
.tl-desc {
  font-size: 0.88rem;
  line-height: 1.75;
  color: var(--ink2);
}

/* ── SKILLS ─────────────────────────────────────────── */
#skills { background: var(--g900); }
#skills .sec-title { color: var(--cream); }
#skills .sec-title em { color: var(--g400); }
#skills .sec-num { color: var(--amber); }
#skills .sec-header { border-bottom-color: var(--g700); }

.skills-panels {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--g700);
  border: 1px solid var(--g700);
}

.skill-panel {
  background: var(--g900);
  padding: 0;
  transition: background 0.25s;
}
.skill-panel:hover { background: rgba(45,90,45,0.2); }

.skill-panel-header {
  padding: 0.6rem 1.2rem;
  background: rgba(45,90,45,0.3);
  border-bottom: 1px solid var(--g700);
  display: flex; align-items: center; gap: 0.6rem;
}
.skill-panel-icon {
  font-size: 0.75rem;
  opacity: 0.8;
}
.skill-panel-title {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--amber);
}

.skill-list {
  padding: 1rem 1.2rem;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.skill-row {
  display: flex; align-items: center; gap: 0.75rem;
}
.skill-row-name {
  font-family: var(--mono);
  font-size: 0.65rem;
  color: var(--g100);
  min-width: 110px;
}
.skill-bar-track {
  flex: 1; height: 3px;
  background: rgba(45,90,45,0.3);
  position: relative;
  overflow: hidden;
}
.skill-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--g600), var(--amber));
  animation: barLoad 1.2s ease-out forwards;
  transform-origin: left;
}
@keyframes barLoad {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

/* ── EDUCATION ──────────────────────────────────────── */
#education { background: var(--cream); }

.edu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--g200);
  border: 1px solid var(--g200);
  margin-bottom: 3rem;
}
.edu-card {
  background: var(--cream);
  padding: 1.5rem;
  transition: background 0.25s;
}
.edu-card:hover { background: var(--cream2); }
.edu-card-year {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--amber2);
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
  display: flex; align-items: center; gap: 0.4rem;
}
.edu-card-year::before {
  content: '';
  display: inline-block;
  width: 16px; height: 1px;
  background: var(--amber2);
}
.edu-card-degree {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--g800);
  line-height: 1.3;
  margin-bottom: 0.4rem;
}
.edu-card-school {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  color: var(--ink3);
}

/* ── LANGUAGES ──────────────────────────────────────── */
.lang-section {
  border: 1px solid var(--g200);
}
.lang-header {
  background: var(--g800);
  padding: 0.5rem 1rem;
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--g200);
}
.lang-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.lang-cell {
  padding: 1.5rem;
  border-right: 1px solid var(--g200);
  text-align: center;
  transition: background 0.2s;
}
.lang-cell:last-child { border-right: none; }
.lang-cell:hover { background: var(--cream2); }
.lang-name {
  font-family: var(--serif);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--g800);
  margin-bottom: 0.25rem;
}
.lang-level {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--g600);
}
.lang-dots {
  display: flex; justify-content: center; gap: 3px;
  margin-top: 0.6rem;
}
.lang-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--g400);
}
.lang-dot.empty { background: var(--g100); border: 1px solid var(--g200); }

/* ── CONTACT ────────────────────────────────────────── */
#contact {
  background: var(--g800);
  padding: 5rem 0;
}
#contact .sec-title { color: var(--cream); }
#contact .sec-title em { color: var(--g400); }
#contact .sec-num { color: var(--amber); }
#contact .sec-header { border-bottom-color: var(--g700); }

.contact-panel {
  border: 1px solid var(--g700);
  display: grid;
  grid-template-columns: repeat(3, 1fr);
}
.contact-cell {
  padding: 2rem;
  border-right: 1px solid var(--g700);
  transition: background 0.25s;
}
.contact-cell:last-child { border-right: none; }
.contact-cell:hover { background: rgba(45,90,45,0.2); }
.contact-cell .label { margin-bottom: 0.75rem; }
.contact-cell a,
.contact-cell span {
  font-family: var(--mono);
  font-size: 0.7rem;
  color: #fff;
  transition: color 0.2s;
  display: block;
  line-height: 1.6;
}
.contact-cell a:hover { color: var(--amber); }

/* ── FOOTER ─────────────────────────────────────────── */
footer {
  background: var(--g900);
  border-top: 1px solid var(--g700);
  padding: 1rem 2rem;
  display: flex; justify-content: space-between; align-items: center;
}
footer span {
  font-family: var(--mono);
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  color: var(--g400);
}

/* ── RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 768px) {
  .nav-links { display: none; }
  .hero-content { padding: 2rem 1.5rem; }
  .hero-contact-grid { grid-template-columns: 1fr; max-width: 100%; }
  .hero-contact-item:nth-child(even) { border-right: 1px solid var(--g700); }
  .hero-contact-item { border-right: none !important; }
  .hero-compass { display: none; }
  .about-layout { grid-template-columns: 1fr; gap: 2rem; }
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .timeline::before { left: 0; }
  .tl-item { grid-template-columns: 1fr; }
  .tl-left { display: none; }
  .tl-dot { display: none; }
  .tl-right { padding: 1.5rem 0; border-top: 1px solid var(--g200); }
  .skills-panels { grid-template-columns: 1fr; }
  .edu-grid { grid-template-columns: 1fr; }
  .lang-grid { grid-template-columns: 1fr; }
  .lang-cell { border-right: none; border-bottom: 1px solid var(--g200); }
  .contact-panel { grid-template-columns: 1fr; }
  .contact-cell { border-right: none; border-bottom: 1px solid var(--g700); }
  .contact-cell:last-child { border-bottom: none; }
  footer { flex-direction: column; gap: 0.5rem; text-align: center; }
}
</style>
</head>

<nav>
